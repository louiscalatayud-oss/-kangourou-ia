<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kangourou IA</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&family=Space+Mono:wght@400&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{height:100vh;overflow:hidden;background:linear-gradient(180deg,#0a2744 0%,#0d3d6e 35%,#0e6a90 65%,#0aa5c0 100%);font-family:'Nunito',sans-serif}

@keyframes sway{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-3deg)}}
@keyframes arm-l{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-8deg)}}
@keyframes arm-r{0%,100%{transform:rotate(0deg)}50%{transform:rotate(8deg)}}
@keyframes ear-l{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-5deg)}}
@keyframes ear-r{0%,100%{transform:rotate(0deg)}50%{transform:rotate(5deg)}}
@keyframes head-sway{0%,100%{transform:rotate(0deg)}50%{transform:rotate(3deg)}}
@keyframes wave1{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes wave2{0%{transform:translateX(-50%)}100%{transform:translateX(0%)}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes kpulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}
@keyframes kfade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes kspin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.waves-wrap{position:fixed;bottom:0;left:0;width:100%;height:130px;pointer-events:none;z-index:0;overflow:hidden}
.wl{position:absolute;bottom:0;left:0;width:200%;height:100%}
.wl svg{width:100%;height:100%}
.wl1{animation:wave1 8s linear infinite;opacity:.5}
.wl2{animation:wave2 12s linear infinite;opacity:.35}

/* ===== AUTH PAGE ===== */
#auth-page{
  display:flex;align-items:center;justify-content:center;
  height:100vh;position:relative;z-index:2;
}
.auth-card{
  background:rgba(5,20,50,0.85);
  border:1px solid rgba(126,232,250,.2);
  border-radius:24px;padding:40px 36px;
  width:100%;max-width:400px;
  backdrop-filter:blur(16px);
  animation:fadeIn .5s ease forwards;
  box-shadow:0 20px 60px rgba(0,0,0,.4);
}
.auth-logo{display:flex;align-items:center;gap:14px;margin-bottom:28px;justify-content:center}
.auth-logo-text{font-size:28px;font-weight:800;color:#fff;text-shadow:0 2px 12px rgba(126,232,250,.4)}
.auth-logo-text span{background:linear-gradient(90deg,#7ee8fa,#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.auth-subtitle{text-align:center;font-size:13px;color:rgba(200,240,255,.5);margin-bottom:28px}
.auth-tabs{display:flex;gap:0;margin-bottom:24px;background:rgba(126,232,250,.06);border-radius:12px;padding:3px}
.auth-tab{flex:1;padding:8px;border:none;background:none;color:rgba(200,240,255,.5);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border-radius:10px;transition:all .2s}
.auth-tab.active{background:rgba(126,232,250,.15);color:#7ee8fa;border:1px solid rgba(126,232,250,.25)}
.auth-field{margin-bottom:14px}
.auth-label{font-size:11px;color:rgba(200,240,255,.6);font-family:'Space Mono',monospace;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;display:block}
.auth-input{
  width:100%;padding:11px 14px;
  background:rgba(126,232,250,.06);
  border:1px solid rgba(126,232,250,.2);
  border-radius:10px;color:#e0f4ff;
  font-family:'Nunito',sans-serif;font-size:14px;
  outline:none;transition:border-color .2s;
}
.auth-input:focus{border-color:rgba(126,232,250,.5)}
.auth-input::placeholder{color:rgba(126,232,250,.3)}
.auth-btn{
  width:100%;padding:13px;margin-top:8px;
  background:linear-gradient(135deg,#1a8fb5,#0aa5c0);
  border:none;border-radius:12px;
  color:#fff;font-family:'Nunito',sans-serif;
  font-size:15px;font-weight:800;cursor:pointer;
  transition:all .2s;box-shadow:0 4px 16px rgba(10,165,192,.3);
}
.auth-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(10,165,192,.5)}
.auth-btn:disabled{opacity:.5;cursor:default;transform:none}
.auth-msg{font-size:12px;text-align:center;margin-top:12px;min-height:18px}
.auth-msg.error{color:#ffb0b0}
.auth-msg.success{color:#7ee8fa}
.auth-divider{display:flex;align-items:center;gap:12px;margin:18px 0}
.auth-divider-line{flex:1;height:1px;background:rgba(126,232,250,.15)}
.auth-divider-text{font-size:11px;color:rgba(126,232,250,.35);white-space:nowrap}
.auth-google{
  width:100%;padding:11px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.15);
  border-radius:12px;color:#e0f4ff;
  font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.auth-google:hover{background:rgba(255,255,255,.12)}

/* ===== APP ===== */
#app{display:none;height:100vh;flex-direction:row}
#app.visible{display:flex}

/* SIDEBAR */
.sidebar{
  width:260px;flex-shrink:0;
  background:rgba(5,20,45,.92);
  border-right:1px solid rgba(126,232,250,.1);
  display:flex;flex-direction:column;
  height:100vh;position:relative;z-index:10;
  backdrop-filter:blur(12px);
  transition:width .3s ease;
}
.sidebar.collapsed{width:0;overflow:hidden}
.sidebar-header{padding:16px 14px 10px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(126,232,250,.08);flex-shrink:0}
.sidebar-logo{width:36px;height:36px;flex-shrink:0;animation:bob 3s ease-in-out infinite;filter:drop-shadow(0 2px 6px rgba(126,232,250,.3))}
.sidebar-title{font-size:16px;font-weight:800;flex:1}
.sidebar-title span{background:linear-gradient(90deg,#7ee8fa,#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sidebar-user{padding:8px 14px;font-size:11px;color:rgba(126,232,250,.5);font-family:'Space Mono',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-new{margin:8px 14px;display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,rgba(126,232,250,.15),rgba(126,232,250,.08));border:1px solid rgba(126,232,250,.25);border-radius:12px;padding:10px 14px;color:#7ee8fa;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Nunito',sans-serif}
.btn-new:hover{background:linear-gradient(135deg,rgba(126,232,250,.25),rgba(126,232,250,.15))}
.sidebar-section{flex:1;overflow-y:auto;padding:0 8px}
.sidebar-section::-webkit-scrollbar{width:3px}
.sidebar-section::-webkit-scrollbar-thumb{background:rgba(126,232,250,.2);border-radius:2px}
.section-label{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:rgba(126,232,250,.4);padding:10px 8px 4px}
.conv-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;cursor:pointer;transition:all .2s;color:rgba(200,240,255,.75);font-size:13px;position:relative;margin-bottom:2px}
.conv-item:hover{background:rgba(126,232,250,.08);color:#e0f4ff}
.conv-item.active{background:rgba(126,232,250,.14);color:#fff;border:1px solid rgba(126,232,250,.2)}
.conv-item-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12.5px}
.conv-item-actions{display:none;gap:2px;flex-shrink:0}
.conv-item:hover .conv-item-actions{display:flex}
.conv-action-btn{background:none;border:none;color:rgba(200,240,255,.5);cursor:pointer;padding:2px 4px;border-radius:4px;font-size:12px;transition:color .2s}
.conv-action-btn:hover{color:#ffb0b0}
.conv-action-btn.fav.active{color:#ffc832}
.sidebar-footer{padding:10px 14px;border-top:1px solid rgba(126,232,250,.08);flex-shrink:0}
.btn-logout{width:100%;padding:8px;background:none;border:1px solid rgba(126,232,250,.15);border-radius:10px;color:rgba(200,240,255,.5);font-family:'Nunito',sans-serif;font-size:12px;cursor:pointer;transition:all .2s}
.btn-logout:hover{border-color:rgba(255,100,100,.4);color:#ffb0b0}
.sidebar-toggle-btn{position:absolute;top:50%;right:-14px;transform:translateY(-50%);width:14px;height:40px;background:rgba(5,20,45,.9);border:1px solid rgba(126,232,250,.15);border-left:none;border-radius:0 6px 6px 0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(126,232,250,.5);font-size:10px;transition:all .2s;z-index:20}
.sidebar-toggle-btn:hover{color:#7ee8fa}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;position:relative;min-width:0}
.content{flex:1;display:flex;flex-direction:column;max-width:720px;width:100%;margin:0 auto;position:relative;z-index:2;min-height:0}
.hero{display:flex;align-items:center;gap:16px;padding:16px 24px 10px;flex-shrink:0}
.kang-wrap{width:84px;height:100px;flex-shrink:0;animation:bob 3s ease-in-out infinite;filter:drop-shadow(0 4px 12px rgba(126,232,250,.35))}
.kang-body-group{transform-origin:50% 80%;animation:sway 3s ease-in-out infinite}
.kang-arm-l{transform-origin:72% 42%;animation:arm-l 3s ease-in-out infinite}
.kang-arm-r{transform-origin:28% 42%;animation:arm-r 3s ease-in-out infinite}
.kang-head-group{transform-origin:50% 90%;animation:head-sway 3s ease-in-out infinite}
.kang-ear-l{transform-origin:60% 95%;animation:ear-l 3s ease-in-out infinite}
.kang-ear-r{transform-origin:40% 95%;animation:ear-r 3s ease-in-out infinite}
.eyebrow{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:#7ee8fa;opacity:.7;margin-bottom:2px}
.title{font-size:24px;font-weight:800;color:#fff;text-shadow:0 2px 12px rgba(126,232,250,.4);line-height:1}
.sub{font-size:11px;color:rgba(200,240,255,.5);margin-top:3px}
.conv-title-display{font-size:10px;color:rgba(126,232,250,.5);font-family:'Space Mono',monospace;margin-top:3px;font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:300px}
.divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(126,232,250,.3),transparent);flex-shrink:0}
.chat{flex:1;padding:14px 24px 0;display:flex;flex-direction:column;gap:12px;overflow-y:auto;min-height:0}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-thumb{background:rgba(126,232,250,.2);border-radius:2px}
.row-l{display:flex;flex-direction:column;align-items:flex-start;animation:kfade .3s ease forwards}
.row-r{display:flex;flex-direction:column;align-items:flex-end;animation:kfade .3s ease forwards}
.lbl{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:3px;opacity:.45;color:#c8f0ff}
.bub{max-width:82%;padding:10px 14px;font-size:14px;line-height:1.6;border-radius:16px}
.bub.ai{background:rgba(10,40,80,.7);border:1px solid rgba(126,232,250,.18);color:#e0f4ff;border-top-left-radius:3px}
.bub.me{background:rgba(126,232,250,.15);border:1px solid rgba(126,232,250,.28);color:rgba(255,255,255,.9);border-top-right-radius:3px}
.typing{background:rgba(10,40,80,.7);border:1px solid rgba(126,232,250,.18);border-radius:16px;border-top-left-radius:3px;padding:10px 14px;display:flex;gap:5px;align-items:center}
.dot{width:6px;height:6px;border-radius:50%;background:#7ee8fa;animation:kpulse 1.2s ease-in-out infinite}
.img-loading{display:flex;align-items:center;gap:8px;color:rgba(200,240,255,.6);font-size:13px;padding:10px 14px;background:rgba(10,40,80,.7);border:1px solid rgba(126,232,250,.18);border-radius:16px;border-top-left-radius:3px}
.spin{display:inline-block;animation:kspin 1.5s linear infinite}
.gen-img{max-width:260px;border-radius:12px;cursor:zoom-in;border:1px solid rgba(126,232,250,.3);box-shadow:0 4px 20px rgba(0,0,0,.4)}
.img-cap{font-size:11px;color:rgba(200,240,255,.4);font-style:italic;margin-top:4px}
.err{font-size:12px;color:#ffb0b0;text-align:center;padding:6px}
.sent-img{max-width:180px;border-radius:10px;border:1px solid rgba(126,232,250,.3);margin-bottom:4px;display:block;cursor:zoom-in}
.preview-wrap{display:flex;align-items:center;gap:8px;background:rgba(126,232,250,.08);border:1px solid rgba(126,232,250,.2);border-radius:10px;padding:6px 10px;margin-bottom:6px}
.preview-wrap.hidden{display:none}
.preview-img-thumb{width:36px;height:36px;object-fit:cover;border-radius:6px}
.preview-name{font-size:11px;color:rgba(200,240,255,.7);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.preview-remove{background:none;border:none;color:rgba(200,240,255,.5);cursor:pointer;font-size:15px;padding:0 4px}
.input-area{padding:12px 24px 20px;flex-shrink:0}
.input-wrap{display:flex;align-items:flex-end;gap:8px;background:rgba(10,40,80,.65);border:1px solid rgba(126,232,250,.25);border-radius:16px;padding:10px 12px;transition:border-color .2s}
.input-wrap:focus-within{border-color:rgba(126,232,250,.5)}
textarea{flex:1;background:transparent;border:none;outline:none;color:#e0f4ff;font-family:'Nunito',sans-serif;font-size:14px;line-height:1.5;resize:none;min-height:20px;max-height:100px}
textarea::placeholder{color:rgba(126,232,250,.35)}
.upload-btn{flex-shrink:0;background:none;border:1px solid rgba(126,232,250,.25);color:rgba(126,232,250,.6);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:15px;transition:all .2s;margin-bottom:1px;display:flex;align-items:center;justify-content:center}
.upload-btn:hover{background:rgba(126,232,250,.1);color:#7ee8fa}
#file-input{display:none}
.send{flex-shrink:0;background:linear-gradient(135deg,#1a8fb5,#0aa5c0);border:none;color:#fff;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:15px;transition:all .2s;box-shadow:0 2px 10px rgba(10,165,192,.4);margin-bottom:1px}
.send:hover:not(:disabled){transform:translateY(-1px)}
.send:disabled{opacity:.3;cursor:default;transform:none;box-shadow:none}
.hint{text-align:center;margin-top:6px;font-size:9px;color:rgba(126,232,250,.2);letter-spacing:.1em;text-transform:uppercase;font-family:'Space Mono',monospace}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:1000;cursor:zoom-out;padding:24px}
.lightbox.hidden{display:none}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:12px}
</style>
</head>
<body>

<div class="waves-wrap">
  <div class="wl wl1"><svg viewBox="0 0 1440 130" preserveAspectRatio="none"><path d="M0,60 C180,95 360,25 540,60 C720,95 900,25 1080,60 C1260,95 1440,25 1440,60 L1440,130 L0,130Z" fill="rgba(126,232,250,0.09)"/></svg></div>
  <div class="wl wl2"><svg viewBox="0 0 1440 130" preserveAspectRatio="none"><path d="M0,80 C200,50 400,110 600,80 C800,50 1000,110 1200,80 C1320,60 1400,90 1440,80 L1440,130 L0,130Z" fill="rgba(10,165,192,0.11)"/></svg></div>
</div>

<!-- AUTH PAGE -->
<div id="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <svg viewBox="0 0 200 200" width="48" height="48" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="ag1" cx="40%" cy="35%" r="65%"><stop offset="0%" stop-color="#F5C56A"/><stop offset="100%" stop-color="#C07018"/></radialGradient>
          <linearGradient id="ag2" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#50D0FF"/><stop offset="100%" stop-color="#0055AA"/></linearGradient>
        </defs>
        <ellipse cx="100" cy="115" rx="52" ry="62" fill="url(#ag1)"/>
        <ellipse cx="98" cy="120" rx="32" ry="42" fill="#FDE9C0" opacity="0.85"/>
        <path d="M72 90 Q70 62 82 44 Q92 28 100 26 Q108 28 118 44 Q130 62 128 90 Q126 114 114 124 Q106 131 100 132 Q94 131 86 124 Q74 114 72 90Z" fill="url(#ag1)"/>
        <path d="M78 84 Q75 58 82 42 Q88 30 100 27 Q112 30 118 42 Q125 58 122 84" fill="#FDE9C0" opacity="0.55"/>
        <path d="M80 88 Q77 65 80 50 Q83 38 88 33 Q92 28 95 31 Q97 34 95 50 Q93 66 91 84Z" fill="url(#ag1)"/>
        <path d="M120 88 Q123 65 120 50 Q117 38 112 33 Q108 28 105 31 Q103 34 105 50 Q107 66 109 84Z" fill="url(#ag1)"/>
        <path d="M81 86 Q78 65 81 52 Q84 41 88 37 Q91 32 94 34 Q96 37 94 52 Q92 66 90 83Z" fill="#F0C070" opacity="0.7"/>
        <path d="M119 86 Q122 65 119 52 Q116 41 112 37 Q109 32 106 34 Q104 37 106 52 Q108 66 110 83Z" fill="#F0C070" opacity="0.7"/>
        <ellipse cx="84" cy="98" rx="9" ry="8" fill="white"/>
        <circle cx="85" cy="99" r="5" fill="#1A0E00"/>
        <circle cx="87" cy="97" r="2" fill="white" opacity="0.9"/>
        <ellipse cx="116" cy="98" rx="9" ry="8" fill="white"/>
        <circle cx="115" cy="99" r="5" fill="#1A0E00"/>
        <circle cx="117" cy="97" r="2" fill="white" opacity="0.9"/>
        <rect x="74" y="93" width="22" height="12" rx="5" fill="#081828" opacity="0.88"/>
        <rect x="76" y="95" width="18" height="8" rx="4" fill="url(#ag2)" opacity="0.9"/>
        <rect x="104" y="93" width="22" height="12" rx="5" fill="#081828" opacity="0.88"/>
        <rect x="106" y="95" width="18" height="8" rx="4" fill="url(#ag2)" opacity="0.9"/>
        <path d="M96 105 Q100 103 104 105" stroke="#081828" stroke-width="2" fill="none"/>
        <path d="M84 114 Q92 120 100 118 Q108 120 116 114" stroke="#7A3808" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
      <div class="auth-logo-text"><span>Kangourou</span></div>
    </div>
    <div class="auth-subtitle">L'IA qui ride les vagues de la connaissance 🏄</div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Connexion</button>
      <button class="auth-tab" onclick="switchTab('signup')">Inscription</button>
    </div>

    <div id="login-form">
      <div class="auth-field">
        <label class="auth-label">Email</label>
        <input class="auth-input" id="login-email" type="email" placeholder="ton@email.com">
      </div>
      <div class="auth-field">
        <label class="auth-label">Mot de passe</label>
        <input class="auth-input" id="login-password" type="password" placeholder="••••••••">
      </div>
      <button class="auth-btn" onclick="login()">Se connecter</button>
    </div>

    <div id="signup-form" style="display:none">
      <div class="auth-field">
        <label class="auth-label">Email</label>
        <input class="auth-input" id="signup-email" type="email" placeholder="ton@email.com">
      </div>
      <div class="auth-field">
        <label class="auth-label">Mot de passe</label>
        <input class="auth-input" id="signup-password" type="password" placeholder="Min. 6 caractères">
      </div>
      <button class="auth-btn" onclick="signup()">Créer mon compte</button>
    </div>

    <div class="auth-divider">
      <div class="auth-divider-line"></div>
      <div class="auth-divider-text">ou</div>
      <div class="auth-divider-line"></div>
    </div>
    <button class="auth-google" onclick="loginWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/></svg>
      Continuer avec Google
    </button>

    <div class="auth-msg" id="auth-msg"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="sidebar" id="sidebar">
    <button class="sidebar-toggle-btn" onclick="toggleSidebar()" id="toggle-btn">◀</button>
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <svg viewBox="0 0 200 200" width="36" height="36" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="sg1" cx="40%" cy="35%" r="65%"><stop offset="0%" stop-color="#F5C56A"/><stop offset="100%" stop-color="#C07018"/></radialGradient>
            <linearGradient id="sg2" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#50D0FF"/><stop offset="100%" stop-color="#0055AA"/></linearGradient>
          </defs>

<script>
// ===== SUPABASE =====
const SUPABASE_URL = 'https://vkmyhzbtzfwvagkblkll.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZrbXloemJ0emZ3dmFna2Jsa2xsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNTc1MTAsImV4cCI6MjA5NTYzMzUxMH0.nf1N1hLu4wPgSkjOLWZIBFLx8yMwOOU_qsOyJ3ZQYw0';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let conversations = [];
let currentConvId = null;
let history = [], busy = false;
let pendingImageBase64 = null, pendingImageType = null;

// ===== AUTH =====
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='signup')));
  document.getElementById('login-form').style.display = tab==='login' ? 'block' : 'none';
  document.getElementById('signup-form').style.display = tab==='signup' ? 'block' : 'none';
  setAuthMsg('','');
}

function setAuthMsg(msg, type) {
  const el = document.getElementById('auth-msg');
  el.textContent = msg; el.className = 'auth-msg' + (type ? ' '+type : '');
}

async function login() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  if (!email || !password) return setAuthMsg('Remplis tous les champs', 'error');
  setAuthMsg('Connexion...', '');
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) setAuthMsg(error.message, 'error');
}

async function signup() {
  const email = document.getElementById('signup-email').value;
  const password = document.getElementById('signup-password').value;
  if (!email || !password) return setAuthMsg('Remplis tous les champs', 'error');
  if (password.length < 6) return setAuthMsg('Mot de passe trop court', 'error');
  setAuthMsg('Création du compte...', '');
  const { error } = await sb.auth.signUp({ email, password });
  if (error) setAuthMsg(error.message, 'error');
  else setAuthMsg('Compte créé ! Vérifie ton email 📧', 'success');
}

async function loginWithGoogle() {
  await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin } });
}

async function logout() {
  await sb.auth.signOut();
  currentUser = null;
  document.getElementById('app').classList.remove('visible');
  document.getElementById('auth-page').style.display = 'flex';
}

// Auth state change
sb.auth.onAuthStateChange(async (event, session) => {
  if (session?.user) {
    currentUser = session.user;
    document.getElementById('auth-page').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    document.getElementById('sidebar-user').textContent = currentUser.email;
    await loadConversations();
  }
});

// ===== CONVERSATIONS SUPABASE =====
async function loadConversations() {
  const { data, error } = await sb.from('conversations').select('*').order('updated_at', { ascending: false });
  if (error) { console.error(error); return; }
  conversations = data || [];
  if (conversations.length === 0) await newConversation();
  else { loadConversation(conversations[0].id); renderSidebar(); }
}

async function newConversation() {
  const { data, error } = await sb.from('conversations').insert({ user_id: currentUser.id, title: 'Nouvelle conversation', messages: [], favorite: false }).select().single();
  if (error) { console.error(error); return; }
  conversations.unshift(data);
  loadConversation(data.id);
  renderSidebar();
}

async function saveConversation() {
  if (!currentConvId) return;
  const conv = conversations.find(c => c.id === currentConvId);
  if (!conv) return;
  await sb.from('conversations').update({ messages: history, title: conv.title, updated_at: new Date().toISOString() }).eq('id', currentConvId);
}

async function deleteConversation(id, e) {
  e.stopPropagation();
  await sb.from('conversations').delete().eq('id', id);
  conversations = conversations.filter(c => c.id !== id);
  if (currentConvId === id) {
    if (conversations.length > 0) loadConversation(conversations[0].id);
    else await newConversation();
  }
  renderSidebar();
}

async function toggleFavorite(id, e) {
  e.stopPropagation();
  const conv = conversations.find(c => c.id === id);
  if (!conv) return;
  conv.favorite = !conv.favorite;
  await sb.from('conversations').update({ favorite: conv.favorite }).eq('id', id);
  renderSidebar();
}

function loadConversation(id) {
  currentConvId = id;
  const conv = conversations.find(c => c.id === id);
  if (!conv) return;
  history = conv.messages || [];
  document.getElementById('conv-title-display').textContent = conv.title;
  const chat = document.getElementById('chat');
  chat.innerHTML = '';
  if (history.length === 0) {
    addMsgToDOM('assistant', 'Yo ! Je suis Kangourou 🦘 — je peux tchatter, générer des images ET analyser tes photos ! 🎨🤙');
  } else {
    history.forEach(m => {
      if (m.hasImage) addMsgWithImageToDOM(`data:${m.imageType};base64,${m.imageBase64}`, m.content);
      else if (m.generatedImage) { addMsgToDOM('assistant', m.content); addGeneratedImgDOM(m.imageUrl, m.prompt); }
      else addMsgToDOM(m.role, m.content);
    });
  }
  renderSidebar();
}

function updateConvTitle(firstMsg) {
  if (!currentConvId) return;
  const conv = conversations.find(c => c.id === currentConvId);
  if (conv && conv.title === 'Nouvelle conversation') {
    conv.title = firstMsg.slice(0, 35) + (firstMsg.length > 35 ? '…' : '');
    document.getElementById('conv-title-display').textContent = conv.title;
    renderSidebar();
  }
}

function renderSidebar() {
  const favsList = document.getElementById('favs-list');
  const recentList = document.getElementById('recent-list');
  const favsSection = document.getElementById('favs-section');
  const favConvs = conversations.filter(c => c.favorite);
  const recentConvs = conversations.filter(c => !c.favorite);
  favsSection.style.display = favConvs.length > 0 ? 'block' : 'none';
  function renderItem(conv) {
    const div = document.createElement('div');
    div.className = 'conv-item' + (conv.id === currentConvId ? ' active' : '');
    div.onclick = () => loadConversation(conv.id);
    div.innerHTML = `<span style="font-size:13px;opacity:.6">💬</span><span class="conv-item-text">${conv.title}</span><div class="conv-item-actions"><button class="conv-action-btn fav ${conv.favorite?'active':''}" onclick="toggleFavorite('${conv.id}',event)">⭐</button><button class="conv-action-btn" onclick="deleteConversation('${conv.id}',event)">🗑</button></div>`;
    return div;
  }
  favsList.innerHTML = ''; favConvs.forEach(c => favsList.appendChild(renderItem(c)));
  recentList.innerHTML = ''; recentConvs.forEach(c => recentList.appendChild(renderItem(c)));
}

function toggleSidebar() {
  const s = document.getElementById('sidebar');
  const b = document.getElementById('toggle-btn');
  s.classList.toggle('collapsed');
  b.textContent = s.classList.contains('collapsed') ? '▶' : '◀';
}

// ===== CHAT =====
const inp = document.getElementById('inp'), btn = document.getElementById('btn');
inp.addEventListener('input', () => { inp.style.height='auto'; inp.style.height=Math.min(inp.scrollHeight,100)+'px'; });
inp.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()} });
btn.addEventListener('click', send);
function scroll(){document.getElementById('chat').scrollTop=document.getElementById('chat').scrollHeight}

function handleFile(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=(e)=>{const r=e.target.result;pendingImageBase64=r.split(',')[1];pendingImageType=file.type;document.getElementById('preview-img').src=r;document.getElementById('preview-name').textContent=file.name;document.getElementById('preview-wrap').classList.remove('hidden')};
  reader.readAsDataURL(file);input.value='';
}
function removeImage(){pendingImageBase64=null;pendingImageType=null;document.getElementById('preview-wrap').classList.add('hidden');document.getElementById('preview-img').src=''}

function addMsgToDOM(role,text){
  const chat=document.getElementById('chat');
  const row=document.createElement('div');row.className=role==='assistant'?'row-l':'row-r';
  const lbl=document.createElement('div');lbl.className='lbl';lbl.textContent=role==='assistant'?'🦘 Kangourou':'Toi';
  const bub=document.createElement('div');bub.className='bub '+(role==='assistant'?'ai':'me');bub.textContent=text;
  row.appendChild(lbl);row.appendChild(bub);chat.appendChild(row);scroll();
}
function addMsgWithImageToDOM(imgSrc,text){
  const chat=document.getElementById('chat');
  const row=document.createElement('div');row.className='row-r';
  const lbl=document.createElement('div');lbl.className='lbl';lbl.textContent='Toi';
  const wrap=document.createElement('div');wrap.style.cssText='display:flex;flex-direction:column;align-items:flex-end;gap:6px';
  const img=document.createElement('img');img.src=imgSrc;img.className='sent-img';
  img.onclick=()=>{document.getElementById('lb-img').src=imgSrc;document.getElementById('lb').classList.remove('hidden')};
  wrap.appendChild(img);
  if(text){const bub=document.createElement('div');bub.className='bub me';bub.textContent=text;wrap.appendChild(bub)}
  row.appendChild(lbl);row.appendChild(wrap);chat.appendChild(row);scroll();
}
function addGeneratedImgDOM(url,prompt){
  const chat=document.getElementById('chat');
  const row=document.createElement('div');row.className='row-l';
  const lbl=document.createElement('div');lbl.className='lbl';lbl.textContent='🦘 Kangourou';
  const wrap=document.createElement('div');
  const img=document.createElement('img');img.className='gen-img';img.src=url;
  img.onclick=()=>{document.getElementById('lb-img').src=url;document.getElementById('lb').classList.remove('hidden')};
  const cap=document.createElement('div');cap.className='img-cap';cap.textContent=prompt.length>70?prompt.slice(0,70)+'…':prompt;
  wrap.appendChild(img);wrap.appendChild(cap);row.appendChild(lbl);row.appendChild(wrap);chat.appendChild(row);scroll();
}
function addTyping(){
  const chat=document.getElementById('chat');
  const row=document.createElement('div');row.className='row-l';
  const lbl=document.createElement('div');lbl.className='lbl';lbl.textContent='🦘 Kangourou';
  const t=document.createElement('div');t.className='typing';
  for(let i=0;i<3;i++){const d=document.createElement('span');d.className='dot';d.style.animationDelay=(i*.2)+'s';t.appendChild(d)}
  row.appendChild(lbl);row.appendChild(t);chat.appendChild(row);scroll();return row;
}
function addImageAnim(prompt,message){
  addMsgToDOM('assistant',message);
  const chat=document.getElementById('chat');
  const row=document.createElement('div');row.className='row-l';
  const lbl=document.createElement('div');lbl.className='lbl';lbl.textContent='🦘 Kangourou';
  const wrap=document.createElement('div');
  const loader=document.createElement('div');loader.className='img-loading';loader.innerHTML='<span class="spin">🌊</span><span>Génération en cours...</span>';
  wrap.appendChild(loader);row.appendChild(lbl);row.appendChild(wrap);chat.appendChild(row);scroll();
  const seed=Math.floor(Math.random()*999999);
  const url='https://image.pollinations.ai/prompt/'+encodeURIComponent(prompt)+'?width=1024&height=1024&seed='+seed+'&nologo=true&model=flux';
  const img=document.createElement('img');img.className='gen-img';
  img.onload=()=>{loader.remove();wrap.appendChild(img);const cap=document.createElement('div');cap.className='img-cap';cap.textContent=prompt.length>70?prompt.slice(0,70)+'…':prompt;wrap.appendChild(cap);scroll()};
  img.onerror=()=>{loader.textContent='❌ Erreur de génération'};
  img.onclick=()=>{document.getElementById('lb-img').src=url;document.getElementById('lb').classList.remove('hidden')};
  img.src=url;
}

async function send(){
  const text=inp.value.trim();
  if((!text&&!pendingImageBase64)||busy)return;
  busy=true;btn.disabled=true;inp.value='';inp.style.height='auto';
  const hasImage=!!pendingImageBase64;
  const imgBase64=pendingImageBase64,imgType=pendingImageType;
  const imgSrc=hasImage?`data:${imgType};base64,${imgBase64}`:null;
  if(hasImage)addMsgWithImageToDOM(imgSrc,text);else addMsgToDOM('user',text);
  const userMsg=hasImage?{role:'user',content:text||'Analyse cette image',hasImage:true,imageBase64:imgBase64,imageType:imgType}:{role:'user',content:text};
  history.push(userMsg);
  if(history.length===1)updateConvTitle(text||'Image envoyée');
  removeImage();
  const typing=addTyping();
  try{
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:history})});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    const raw=data.reply||'...';
    typing.remove();
    let parsed=null;
    try{const m=raw.match(/\{[^{}]*"action"\s*:\s*"generate_image"[^{}]*\}/s);if(m)parsed=JSON.parse(m[0])}catch(e){}
    if(parsed?.action==='generate_image'){
      history.push({role:'assistant',content:parsed.message||'Image en cours!',generatedImage:true,imageUrl:'https://image.pollinations.ai/prompt/'+encodeURIComponent(parsed.prompt),prompt:parsed.prompt});
      addImageAnim(parsed.prompt,parsed.message||'Voilà ce que je génère 🎨');
    }else{
      history.push({role:'assistant',content:raw});addMsgToDOM('assistant',raw);
    }
    await saveConversation();
  }catch(e){
    typing.remove();
    const err=document.createElement('div');err.className='err';err.textContent='Erreur: '+e.message;
    document.getElementById('chat').appendChild(err);scroll();
  }
  busy=false;btn.disabled=false;inp.focus();
}
</script>
</body>
</html>
